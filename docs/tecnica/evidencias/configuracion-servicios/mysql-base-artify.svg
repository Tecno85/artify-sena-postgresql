<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" role="img" aria-labelledby="title desc">
  <title id="title">Base de datos artify_db verificada</title>
  <desc id="desc">Resultado real sanitizado de las consultas SHOW DATABASES, USE artify_db y SHOW TABLES.</desc>
  <defs>
    <style>
      .bg { fill: #eef3f8; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; }
      .bar { fill: #1f2937; }
      .dot-red { fill: #ef4444; }
      .dot-yellow { fill: #f59e0b; }
      .dot-green { fill: #22c55e; }
      .title { font: 700 18px Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .cmd { font: 15px Menlo, Consolas, monospace; fill: #93c5fd; }
      .text { font: 15px Menlo, Consolas, monospace; fill: #d1d5db; }
      .ok { font: 700 15px Menlo, Consolas, monospace; fill: #86efac; }
    </style>
  </defs>
  <rect class="bg" width="980" height="480" rx="18" />
  <rect class="panel" x="70" y="48" width="840" height="384" rx="16" />
  <rect class="bar" x="70" y="48" width="840" height="54" rx="16" />
  <circle class="dot-red" cx="102" cy="75" r="7" />
  <circle class="dot-yellow" cx="126" cy="75" r="7" />
  <circle class="dot-green" cx="150" cy="75" r="7" />
  <text class="title" x="490" y="82" text-anchor="middle">MySQL - artify_db</text>
  <text class="cmd" x="112" y="140">mysql&gt; SHOW DATABASES;</text>
  <text class="ok" x="112" y="176">artify_db</text>
  <text class="cmd" x="112" y="216">mysql&gt; USE artify_db;</text>
  <text class="ok" x="112" y="250">Database changed</text>
  <text class="cmd" x="112" y="290">mysql&gt; SHOW TABLES;</text>
  <text class="text" x="112" y="326">CONFIGURACION    IMAGEN    OPERACION</text>
  <text class="text" x="112" y="356">SESION_EDICION   USUARIO   v_usuarios_activos</text>
  <text class="ok" x="112" y="398">Resultado: esquema y objetos disponibles.</text>
</svg>
